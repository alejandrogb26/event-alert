name: event_alert
description: "App para gestionar eventos y avisos del calendario."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_timezone: ^5.1.0
  intl: ^0.20.2
  path: ^1.9.1
  permission_handler: ^12.0.3
  sqflite: ^2.4.3
  table_calendar: ^3.2.0
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true